<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Essays — Semeion</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">


<style>

:root{
  --cream:#F1E8D8;
  --ink:#16130F;
  --crimson:#A31F2B;
  --muted:rgba(22,19,15,0.65);

  --display:'Anton', sans-serif;
  --sans:'IBM Plex Sans', sans-serif;
}


*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}


body{
  background:var(--cream);
  color:var(--ink);
  font-family:var(--sans);
  height:100vh;
  overflow:hidden;
}


.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:50px 60px;
}


/* HEADER */

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}


.brand{
  font-family:var(--display);
  letter-spacing:0.08em;
}


.meta{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--muted);
}



/* EMPTY STATE */

.empty{
  height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}


h1{
  font-family:var(--display);
  font-size:70px;
  letter-spacing:0.08em;
  color:var(--crimson);
  margin-bottom:40px;
}



/* SNAKE */

.snake{
  position:relative;
  width:90px;
  height:35px;
  opacity:0;
  transform:translateY(15px);
  animation:appear 1s ease forwards;
  animation-delay:1.5s;
}


.snake-body{
  position:absolute;
  left:0;
  bottom:7px;
  display:flex;
  gap:2px;
  align-items:center;
}


.snake-body span{
  display:block;
  width:10px;
  height:10px;
  background:var(--crimson);
  border-radius:50%;
  animation:snakeWave 1.2s infinite ease-in-out;
}


.snake-body span:nth-child(2){
  animation-delay:.1s;
}

.snake-body span:nth-child(3){
  animation-delay:.2s;
}

.snake-body span:nth-child(4){
  animation-delay:.3s;
}

.snake-body span:nth-child(5){
  animation-delay:.4s;
}



/* HEAD */

.snake-head{
  position:absolute;
  right:0;
  bottom:5px;
  width:16px;
  height:16px;
  background:var(--crimson);
  border-radius:50%;
}


.snake-head:before,
.snake-head:after{
  content:"";
  position:absolute;
  top:5px;
  width:3px;
  height:3px;
  background:var(--cream);
  border-radius:50%;
}


.snake-head:before{
  left:4px;
}


.snake-head:after{
  right:4px;
}


/* TONGUE */

.snake-head span{
  position:absolute;
  right:-7px;
  bottom:3px;
  width:8px;
  height:1px;
  background:var(--crimson);
}



@keyframes snakeWave{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-6px);
  }

}



@keyframes appear{

  to{
    opacity:1;
    transform:translateY(0);
  }

}


</style>

</head>


<body>


<div class="wrap">


<div class="top">

<div class="brand">
SEMEION
</div>


<div class="meta">
ESSAYS
</div>

</div>



<div class="empty">


<h1>
TBC
</h1>



<div class="snake">

<div class="snake-body">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>


<div class="snake-head">
<span></span>
</div>


</div>



</div>


</div>


</body>
</html>
